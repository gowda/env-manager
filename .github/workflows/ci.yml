name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.repository }}-ci-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: env_manager_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: env_manager_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install JavaScript dependencies
        run: yarn install --immutable

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare database
        run: bin/rails db:prepare

      - name: Precompile assets
        run: bin/rails assets:precompile
        env:
          SECRET_KEY_BASE_DUMMY: 1
          SKIP_YARN_INSTALL: 1

      - name: Run test suite
        run: bundle exec rspec

  build_image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build application image
        run: |
          RUBY_VERSION=$(cat .ruby-version)
          docker build --build-arg RUBY_VERSION="${RUBY_VERSION#ruby-}" -t env-manager:test .

  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run Brakeman scan
        id: brakeman
        continue-on-error: true
        shell: bash
        run: |
          set +e
          bin/brakeman --no-pager > brakeman.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          {
            echo "details<<EOF"
            cat brakeman.log
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run bundler-audit scan
        id: bundler_audit
        continue-on-error: true
        shell: bash
        run: |
          set +e
          bin/bundler-audit > bundler-audit.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          {
            echo "details<<EOF"
            cat bundler-audit.log
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish security summary
        if: always()
        shell: bash
        env:
          BRAKEMAN_STATUS: ${{ steps.brakeman.outputs.status }}
          BRAKEMAN_DETAILS: ${{ steps.brakeman.outputs.details }}
          BUNDLER_AUDIT_STATUS: ${{ steps.bundler_audit.outputs.status }}
          BUNDLER_AUDIT_DETAILS: ${{ steps.bundler_audit.outputs.details }}
        run: |
          render_section() {
            local title="$1"
            local status="$2"
            local details="$3"

            if [ "$status" = "0" ]; then
              {
                echo "<details open>"
                echo "<summary><strong>🟢 $title</strong> - clean result</summary>"
                echo
                echo "<p><span style=\"color:#1a7f37;\"><strong>Success:</strong> No problems found. This check looks good.</span></p>"
                echo
                echo "</details>"
                echo
              } >> "$GITHUB_STEP_SUMMARY"
            elif [ -n "$status" ]; then
              {
                echo "<details open>"
                echo "<summary><strong>🔴 $title</strong> - action needed</summary>"
                echo
                echo "<p><span style=\"color:#cf222e;\"><strong>Error:</strong> This check found an issue. Please review the output below.</span></p>"
                echo
                echo '```text'
                printf '%s\n' "$details"
                echo '```'
                echo "</details>"
                echo
              } >> "$GITHUB_STEP_SUMMARY"
            else
              {
                echo "<details open>"
                echo "<summary><strong>🔵 $title</strong> - information</summary>"
                echo
                echo "<p><span style=\"color:#0969da;\"><strong>Info:</strong> This check did not return a clear result. Please review the workflow logs.</span></p>"
                echo
                echo "</details>"
                echo
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          {
            echo "# Ruby security scan summary"
            echo
            echo "<p><span style=\"color:#0969da;\"><strong>Info:</strong> Here is the result of the security checks for this run.</span></p>"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          render_section "Brakeman" "$BRAKEMAN_STATUS" "$BRAKEMAN_DETAILS"
          render_section "bundler-audit" "$BUNDLER_AUDIT_STATUS" "$BUNDLER_AUDIT_DETAILS"

      - name: Fail job when security scans fail
        if: always()
        shell: bash
        env:
          BRAKEMAN_STATUS: ${{ steps.brakeman.outputs.status }}
          BUNDLER_AUDIT_STATUS: ${{ steps.bundler_audit.outputs.status }}
        run: |
          if [ "$BRAKEMAN_STATUS" != "0" ] || [ "$BUNDLER_AUDIT_STATUS" != "0" ]; then
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github
